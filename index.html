<!DOCTYPE html>
<html lang="om">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibuu Sire Court</title>
    <style>
      :root {
        --primary: #004aad;
        --primary-dark: #002f6c;
        --bg: #fdf7ea;
        --card: #ffffff;
        --text: #2f2f3d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #fff7e0, var(--bg));
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        padding: 32px;
        max-width: 640px;
        width: 100%;
      }

      .logo {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin: 0 auto 18px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px rgba(31, 111, 235, 0.25);
        overflow: hidden;
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 30px;
        text-align: center;
      }

      p {
        line-height: 1.8;
        margin: 0 0 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 10px;
      }

      .button-link {
        display: inline-block;
        padding: 14px 22px;
        background-color: var(--primary);
        color: #ffffff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
        transition: background 0.2s ease;
      }

      .button-link:hover {
        background-color: #003f7a;
      }

      .note {
        margin-top: 20px;
        font-size: 14px;
        color: #5b6b80;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo"><img src="logo.png" alt="Sibuu Sire Court Logo"></div>
      <h1>Sibuu Sire Court</h1>
      <p>Mana murtii Aanaa Sibuu Siree fi tajaajila viidiyoo konfiraansii kana irratti argamu.</p>
      <p>Isinis asiin seenuun tajaajilaa barbaadan argachuu dandeessu.</p>
      <p><strong>Nu qunnamuuf:</strong> <a href="tel:+251984024074">0984024074</a></p>

      <div class="actions">
        <a class="button-link" href="https://meet.google.com/vcv-gcrh-weh?hl=en" target="_blank" rel="noopener noreferrer">Google Meet seenuu</a>
      </div>

      <p class="note">Kutaa VK</p>
    </div>
  </body>
</html>
